name: Release WRT
run-name: Release - ${{ github.event.inputs.model || 'auto' }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: false 
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_libwrt
        options:
          - aliyun_ap8220_immwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - n1_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt

env:
  MODEL: ${{ github.event.inputs.model || 'jdcloud_ipq60xx_libwrt' }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install BC
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq install bc

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/share/glade* /usr/local/share/chromium /usr/local/share/powershell"
          testing: false

      - name: Checkout Projects
        uses: actions/checkout@main
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_MONTH=$(TZ=UTC-8 date +"%y.%m")
          echo "BUILD_MONTH=$BUILD_MONTH" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ env.MODEL }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ env.MODEL }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware
        run: ./build.sh ${{ env.MODEL }}

      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "Firmware file count: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "===================================================="

      - name: Package OpenWrt Firmware
        if: ${{ env.MODEL == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y
          WHOAMI: ZqinKing

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          # 定义固件解压后的根目录路径（请根据你实际的输出目录调整）
          # 通常 GitHub Actions 编译出的 squashfs 固件根文件系统会输出在 bin/targets/.../root.squashfs-overlaydir 或类似目录
          FIRMWARE_ROOT="${{ env.PACKAGED_OUTPUTPATH || './firmware' }}/root"
          
          # 如果 root 目录不存在，尝试寻找包含 etc/config 的根文件系统目录
          if [ ! -d "$FIRMWARE_ROOT/etc/config" ]; then
             # 这里的路径需要根据你的具体编译源码（如 coolsnowwolf/lede 等）的实际输出结构微调
             FIRMWARE_ROOT=$(find ./bin/targets -type d -name "root" | head -n 1)
          fi

          # 从固件内部的 network 配置文件中直接抓取 LAN 地址
          LAN_IP=$(grep -oP "option ipaddr '\K[^']+" $FIRMWARE_ROOT/etc/config/network | head -n 1)
          # 如果没找到静态 ipaddr（比如默认是 dhcp），可以设置一个提示
          [ -z "$LAN_IP" ] && LAN_IP="未设置(可能为DHCP)"
          
          # 从固件内部的 wireless 配置文件中直接抓取 WiFi 密码
          WIFI_PWD=$(grep -oP "option key '\K[^']+" $FIRMWARE_ROOT/etc/config/wireless | head -n 1)
          # 如果没有设置密码，显示为开放网络
          [ -z "$WIFI_PWD" ] && WIFI_PWD="无密码(开放)"
          
          echo "WIFI密码: $WIFI_PWD" >> release_body.txt
          echo "LAN地址: $LAN_IP" >> release_body.txt
          #echo "WIFI密码: 12345678" >> release_body.txt
          #echo "LAN地址: 10.0.10.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: ${{ env.BUILD_DATE }}_${{ env.MODEL }}
          tag_name: ${{ env.BUILD_MONTH }}_${{ env.MODEL }}
          files: ${{ env.MODEL == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
